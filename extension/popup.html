<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSense AI</title>
    <style>
      body {
        width: 350px;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      h3 {
        margin-top: 0;
        color: #333;
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        width: 100%;
      }
      button:hover {
        background-color: #45a049;
      }
      #output {
        margin-top: 15px;
        padding: 10px;
        background-color: #f5f5f5;
        border-radius: 5px;
        white-space: pre-wrap;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>EventSense AI</h3>
    <button id="analyze">Analyze Email</button>
    <pre id="output">Click the button to analyze the current Gmail email.</pre>
    <script src="popup.js"></script>
  </body>
</html>
